<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitty World - Juego de Gatos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="launcher">
        <h1>🐱 Kitty World 🐱</h1>
        <p>¡Bienvenido al mundo de los gatos! Un juego divertido y adorable.</p>
        <button id="start-btn">Empezar Juego</button>
        <button id="options-btn">Opciones</button>
        <button id="exit-btn">Salir</button>
    </div>

    <div id="character-creation" style="display: none;">
        <h1>Crear tu Gatito</h1>
        <form id="creation-form">
            <label for="cat-name">Nombre de tu gatito:</label>
            <input type="text" id="cat-name" required maxlength="20">

            <label>Elige la raza:</label>
            <div class="breed-selection">
                <div class="breed-option" data-breed="birmano">
                    <canvas class="pixel-cat" data-breed="birmano"></canvas>
                    <span>Birmano</span>
                </div>
                <div class="breed-option" data-breed="persa">
                    <canvas class="pixel-cat" data-breed="persa"></canvas>
                    <span>Persa</span>
                </div>
                <div class="breed-option" data-breed="mau-egipcio">
                    <canvas class="pixel-cat" data-breed="mau-egipcio"></canvas>
                    <span>Mau Egipcio</span>
                </div>
                <div class="breed-option" data-breed="siames">
                    <canvas class="pixel-cat" data-breed="siames"></canvas>
                    <span>Siamés</span>
                </div>
                <div class="breed-option" data-breed="esfinge">
                    <canvas class="pixel-cat" data-breed="esfinge"></canvas>
                    <span>Esfinge</span>
                </div>
            </div>

            <button type="submit" id="create-btn">¡Crear Gatito!</button>
        </form>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="game-ui">
            <div id="cat-info">
                <span id="cat-name-display"></span> - <span id="cat-breed-display"></span>
            </div>
            <button id="back-to-launcher">Volver al Inicio</button>
        </div>
        <div id="game-world">
            <div id="house">🏠</div>
            <div id="garden">
                <div class="tree">🌳</div>
                <div class="tree">🌲</div>
                <div class="tree">🌳</div>
            </div>
            <div id="river">🌊🌊🌊🌊🌊</div>
            <img id="cat-sprite" src="" alt="Tu gatito">
        </div>
    </div>

    <div id="house-interior" style="display: none;">
        <div id="house-ui">
            <div id="house-cat-info">
                <span id="house-cat-name"></span> - <span id="house-cat-breed"></span>
            </div>
            <button id="exit-house">Salir de la Casa</button>
        </div>
        <div id="house-room">
            <div id="bed">🛏️</div>
            <div id="food-bowl">🍽️</div>
            <div id="toy">🧶</div>
            <div id="window">🪟</div>
            <img id="house-cat-sprite" src="" alt="Tu gatito en casa">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
